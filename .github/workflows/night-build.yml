name: FFmpeg Nightly Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 19 * * *'  # 北京时间每天 03:00
  push:
    tags:
      - 'v*'

permissions:
  contents: write
jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      package_suffix: ${{ steps.release_meta.outputs.package_suffix }}
      release_tag: ${{ steps.release_meta.outputs.release_tag }}
      release_name: ${{ steps.release_meta.outputs.release_name }}
      release_body: ${{ steps.release_meta.outputs.release_body }}
      release_prerelease: ${{ steps.release_meta.outputs.release_prerelease }}
      release_make_latest: ${{ steps.release_meta.outputs.release_make_latest }}
    steps:
      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" =~ ^v[0-9]+(\.[0-9]+)*$ ]]; then
            PACKAGE_SUFFIX="${GITHUB_REF_NAME}"
            RELEASE_TAG="${GITHUB_REF_NAME}"
            RELEASE_NAME="Release ${GITHUB_REF_NAME}"
            RELEASE_PRERELEASE=false
            RELEASE_MAKE_LATEST=true
            TRIGGER_NOTE="Triggered by tag push: ${GITHUB_REF_NAME}"
          else
            BUILD_DATE="$(TZ=Asia/Shanghai date +%Y%m%d)"
            PACKAGE_SUFFIX="nightbuild-${BUILD_DATE}"
            RELEASE_TAG="nightly"
            RELEASE_NAME="Nightly Build ${BUILD_DATE}"
            RELEASE_PRERELEASE=true
            RELEASE_MAKE_LATEST=false

            if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
              TRIGGER_NOTE="Triggered by GitHub schedule"
            else
              TRIGGER_NOTE="Triggered manually via workflow_dispatch"
            fi
          fi

          {
            echo "package_suffix=${PACKAGE_SUFFIX}"
            echo "release_tag=${RELEASE_TAG}"
            echo "release_name=${RELEASE_NAME}"
            echo "release_prerelease=${RELEASE_PRERELEASE}"
            echo "release_make_latest=${RELEASE_MAKE_LATEST}"
            echo "release_body<<EOF"
            echo "${TRIGGER_NOTE}"
            echo "PACKAGE_SUFFIX=${PACKAGE_SUFFIX}"
            echo "Commit: ${GITHUB_SHA}"
            echo "Ref: ${GITHUB_REF}"
            echo "Generated by ncipollo/release-action@v1"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  prepare-source:
    runs-on: ubuntu-latest
    outputs:
      ffmpeg_version: ${{ steps.get_version.outputs.ffmpeg_version }}
    steps:
      - uses: actions/checkout@v5
      - name: Load version into env
        id: get_version
        run: |
          VERSION=$(bash ./version.sh)
          echo "FFMPEG_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "ffmpeg_version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Cache source tarball
        uses: actions/cache@v5
        with:
            path: ~/archive
            key: cache-ffmpeg-source-${{ steps.get_version.outputs.ffmpeg_version }}
      - name: Download source tarball
        run: |
          mkdir -p ~/archive
          ./prepare.sh
      - name: Upload source tarball
        uses: actions/upload-artifact@v6
        with:
          name: ffmpeg-source-${{ steps.get_version.outputs.ffmpeg_version }}
          path: ~/archive/*.tar.*
          if-no-files-found: error
          retention-days: 2

  build-linux-x64:
     runs-on: ubuntu-latest
     needs:
       - prepare-release
       - prepare-source
     env:
       PACKAGE_SUFFIX: ${{ needs.prepare-release.outputs.package_suffix }}
     steps:
       - uses: actions/checkout@v5
       - uses: actions/download-artifact@v8
         with:
          name: ffmpeg-source-${{ needs.prepare-source.outputs.ffmpeg_version }}
          path: ./archive
       - run: ls -la 
       - name: Build
         run: |
           echo "Building linux-x64..."
           ./build_linux.sh
           ls -lah out/
       - name: Upload x64 artifact
         uses: actions/upload-artifact@v6
         with:
           name: ffmpeg-linux-x86_64
           path: out/ffmpeg-linux-x86_64-${{ needs.prepare-release.outputs.package_suffix }}.tar.gz
           if-no-files-found: error
           retention-days: 2

  build-linux-aarch64:
     runs-on: ubuntu-24.04-arm
     needs:
       - prepare-release
       - prepare-source
     env:
       PACKAGE_SUFFIX: ${{ needs.prepare-release.outputs.package_suffix }}
     steps:
       - uses: actions/checkout@v5
       - uses: actions/download-artifact@v8
         with:
          name: ffmpeg-source-${{ needs.prepare-source.outputs.ffmpeg_version }}
          path: ./archive
       - run: ls -la 
       - name: Build
         run: |
           echo "Building linux-aarch64..."
           ./build_linux.sh
           ls -lah out/
       - name: Upload aarch64 artifact
         uses: actions/upload-artifact@v6
         with:
           name: ffmpeg-linux-aarch64
           path: out/ffmpeg-linux-aarch64-${{ needs.prepare-release.outputs.package_suffix }}.tar.gz
           if-no-files-found: error
           retention-days: 2

  build-windows-x64:
    runs-on: windows-latest
    needs:
      - prepare-release
      - prepare-source
    env:
      PACKAGE_SUFFIX: ${{ needs.prepare-release.outputs.package_suffix }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v8
        with:
          name: ffmpeg-source-${{ needs.prepare-source.outputs.ffmpeg_version }}
          path: ./archive
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel
            git
            tar
            diffutils
            make
            pkgconf
            yasm
            nasm
            ninja
            unzip
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-meson
            mingw-w64-ucrt-x86_64-gcc
      - name: Install CMake 3.27.9
        shell: msys2 {0}
        run: |
          mkdir -p /opt/cmake
          curl -L -o cmake.zip https://github.com/Kitware/CMake/releases/download/v3.27.9/cmake-3.27.9-windows-x86_64.zip
          unzip -q cmake.zip -d /opt/cmake
          export PATH="/opt/cmake/cmake-3.27.9-windows-x86_64/bin:$PATH"
          cmake --version
      - name: Build
        shell: msys2 {0}
        run: |
          echo "Building windows-x64..."
          chmod +x ./build_windows.sh
          ./build_windows.sh x86_64
          ls -lah out/
      - name: Upload windows x64 artifact
        uses: actions/upload-artifact@v6
        with:
          name: ffmpeg-windows-x86_64
          path: out/ffmpeg-windows-x86_64-${{ needs.prepare-release.outputs.package_suffix }}.tar.gz
          if-no-files-found: error
          retention-days: 2


  build-macos-x64:
    runs-on: macos-15-intel
    needs:
      - prepare-release
      - prepare-source
    env:
      PACKAGE_SUFFIX: ${{ needs.prepare-release.outputs.package_suffix }}
    steps:
      - uses: actions/checkout@v5
      - name: Setup Homebrew dependencies
        run: |
          brew update
          brew install nasm yasm meson ninja  pkg-config
      - uses: actions/download-artifact@v8
        with:
           name: ffmpeg-source-${{ needs.prepare-source.outputs.ffmpeg_version }}
           path: ./archive
      - name: Install CMake 3.27.9
        run: |
          mkdir -p "$HOME/.local/cmake"
          curl -L -o cmake.tar.gz https://github.com/Kitware/CMake/releases/download/v3.27.9/cmake-3.27.9-macos-universal.tar.gz
          tar -xzf cmake.tar.gz -C "$HOME/.local/cmake"
          echo "$HOME/.local/cmake/cmake-3.27.9-macos-universal/CMake.app/Contents/bin" >> $GITHUB_PATH
          "$HOME/.local/cmake/cmake-3.27.9-macos-universal/CMake.app/Contents/bin/cmake" --version
      - name: Build
        run: |
          echo "Building macos-x64..."
          chmod +x ./build_macos.sh
          ./build_macos.sh x86_64
          ls -lah out/
      - name: Upload macOS x64 artifact
        uses: actions/upload-artifact@v6
        with:
          name: ffmpeg-darwin-x86_64
          path: out/ffmpeg-darwin-x86_64-${{ needs.prepare-release.outputs.package_suffix }}.tar.gz
          if-no-files-found: error
          retention-days: 2

  build-macos-aarch64:
    runs-on: macos-latest
    needs:
      - prepare-release
      - prepare-source
    env:
      PACKAGE_SUFFIX: ${{ needs.prepare-release.outputs.package_suffix }}
    steps:
      - uses: actions/checkout@v5
      - name: Setup Homebrew dependencies
        run: |
          brew update
          brew install nasm yasm meson ninja pkg-config
      - uses: actions/download-artifact@v8
        with:
           name: ffmpeg-source-${{ needs.prepare-source.outputs.ffmpeg_version }}
           path: ./archive
      - name: Install CMake 3.27.9
        run: |
          mkdir -p "$HOME/.local/cmake"
          curl -L -o cmake.tar.gz https://github.com/Kitware/CMake/releases/download/v3.27.9/cmake-3.27.9-macos-universal.tar.gz
          tar -xzf cmake.tar.gz -C "$HOME/.local/cmake"
          echo "$HOME/.local/cmake/cmake-3.27.9-macos-universal/CMake.app/Contents/bin" >> $GITHUB_PATH
          "$HOME/.local/cmake/cmake-3.27.9-macos-universal/CMake.app/Contents/bin/cmake" --version
      - name: Build
        run: |
          echo "Building macos-aarch64..."
          chmod +x ./build_macos.sh
          ./build_macos.sh aarch64
          ls -lah out/
      - name: Upload macOS aarch64 artifact
        uses: actions/upload-artifact@v6
        with:
          name: ffmpeg-darwin-aarch64
          path: out/ffmpeg-darwin-aarch64-${{ needs.prepare-release.outputs.package_suffix }}.tar.gz
          if-no-files-found: error
          retention-days: 2

  publish-release:
   needs:
     - prepare-release
     - build-linux-x64
     - build-linux-aarch64
     - build-windows-x64
     - build-macos-x64
     - build-macos-aarch64
   runs-on: ubuntu-latest
   steps:
     - name: Download linux x64 artifact
       uses: actions/download-artifact@v8
       with:
         name: ffmpeg-linux-x86_64
         path: dist
     - name: Download linux aarch64 artifact
       uses: actions/download-artifact@v8
       with:
         name: ffmpeg-linux-aarch64
         path: dist
     - name: Download windows artifact
       uses: actions/download-artifact@v8
       with:
         name: ffmpeg-windows-x86_64
         path: dist
     - name: Download macOS x64 artifact
       uses: actions/download-artifact@v8
       with:
         name: ffmpeg-darwin-x86_64
         path: dist
     - name: Download macOS aarch64 artifact
       uses: actions/download-artifact@v8
       with:
         name: ffmpeg-darwin-aarch64
         path: dist
     - name: Show downloaded files
       run: ls -lah dist
     - name: Publish Release
       uses: ncipollo/release-action@v1
       with:
         tag: ${{ needs.prepare-release.outputs.release_tag }}
         name: ${{ needs.prepare-release.outputs.release_name }}
         body: ${{ needs.prepare-release.outputs.release_body }}
         artifacts: "dist/*.tar.gz"
         allowUpdates: true
         replacesArtifacts: true
         removeArtifacts: true
         prerelease: ${{ needs.prepare-release.outputs.release_prerelease }}
         makeLatest: ${{ needs.prepare-release.outputs.release_make_latest }}
