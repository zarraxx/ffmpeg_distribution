name: FFmpeg Nightly Build
on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 19 * * *'  # 北京时间每天 03:00
jobs:
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build
        run: |
          echo "Building linux-x64..."
          ./build_linux.sh
          ls -lah out/
      - name: Upload x64 artifact
        uses: actions/upload-artifact@v6
        with:
          name: ffmpeg-linux-x86_64
          path: out/ffmpeg-linux-x86_64.tar.gz
          if-no-files-found: error
  build-linux-aarch64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
      - name: Build
        run: |
          echo "Building linux-aarch64..."
          ./build_linux.sh
          ls -lah out/
      - name: Upload aarch64 artifact
        uses: actions/upload-artifact@v6
        with:
          name: ffmpeg-linux-aarch64
          path: out/ffmpeg-linux-aarch64.tar.gz
          if-no-files-found: error

  publish-nightly:
    needs:
      - build-linux-x64
      - build-linux-aarch64
    runs-on: ubuntu-latest
    steps:
      - name: Download x64 artifact
        uses: actions/download-artifact@v8
        with:
          name: ffmpeg-linux-x86_64
          path: dist
      - name: Download aarch64 artifact
        uses: actions/download-artifact@v8
        with:
          name: ffmpeg-linux-aarch64
          path: dist
      - name: Show downloaded files
        run: ls -lah dist
      - name: Publish Nightly Release
        uses: ncipollo/release-action@v1
        with:
          tag: nightly
          name: Nightly Build
          body: |
            Automated nightly build.
            Commit: ${{ github.sha }}
            Trigger: ${{ github.event_name }}
          artifacts: "dist/*.tar.gz"
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          prerelease: true
          makeLatest: false
